<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(rgba(0,0,0,.5),
            rgba(0,0,0,.5)),
            url('https://images.unsplash.com/photo-1497366811353-6870744d04b2?w=1600');
            background-size:cover;
            background-position:center;
        }

        .login-container{
            width:850px;
            height:500px;
            display:flex;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 40px rgba(0,0,0,.3);
        }

        .left{
            width:50%;
            background:white;
            padding:50px;
        }

        .left h2{
            text-align:center;
            color:#6c63ff;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:15px;
            border:1px solid #ddd;
            border-radius:10px;
            outline:none;
        }

        .input-box input:focus{
            border-color:#6c63ff;
        }

        .btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#6c63ff;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .btn:hover{
            background:#4834d4;
        }

        .forgot{
            text-align:right;
            margin:10px 0 20px;
        }

        .forgot a{
            text-decoration:none;
            color:#6c63ff;
        }

        .signup-link{
            text-align:center;
            margin-top:20px;
        }

        .signup-link a{
            text-decoration:none;
            color:#6c63ff;
            font-weight:bold;
        }

        .right{
            width:50%;
            background:linear-gradient(135deg,#6c63ff,#4834d4);
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:40px;
        }

        .right h1{
            font-size:40px;
            margin-bottom:20px;
        }

        .right p{
            line-height:1.8;
            font-size:18px;
        }

    </style>

</head>
<body>

<div class="login-container">

    <div class="left">

        <h2>Employee Login</h2>

        <form action="/loginEmployee" method="post">

            <div class="input-box">
                <input type="email" name="email"
                       placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <input type="password" name="password"
                       placeholder="Password" required>
            </div>

            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>

            <button class="btn">Sign In</button>

            <div class="signup-link">
                Don't have an account?
                <a href="signup.html">Sign Up</a>
            </div>

        </form>

    </div>

    <div class="right">

        <h1>Welcome Back</h1>

        <p>
            Login to access employee records,
            attendance management, payroll tracking,
            department details and HR services.
        </p>

    </div>

</div>

</body>
</html>
