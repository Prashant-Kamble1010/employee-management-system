<!DOCTYPE html>
<html>
<head>
    <title>Attendance Management</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
        }

        body{
        background:#f4f6f9;
        padding:30px;
        }

        .header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:25px;
        }

        .date{
        font-size:18px;
        font-weight:bold;
        color:#6c63ff;
        }

        .cards{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:20px;
        margin-bottom:30px;
        }

        .card{
        background:white;
        padding:25px;
        border-radius:15px;
        box-shadow:0 4px 10px rgba(0,0,0,.1);
        text-align:center;
        }

        .card h2{
        margin-top:10px;
        color:#333;
        }

        .present{
        border-left:5px solid #28a745;
        }

        .absent{
        border-left:5px solid #dc3545;
        }

        .leave{
        border-left:5px solid #ffc107;
        }

        table{
        width:100%;
        background:white;
        border-collapse:collapse;
        border-radius:15px;
        overflow:hidden;
        box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        th{
        background:#6c63ff;
        color:white;
        padding:15px;
        }

        td{
        padding:12px;
        text-align:center;
        border-bottom:1px solid #eee;
        }

        select,input[type=time]{
        padding:8px;
        border:1px solid #ddd;
        border-radius:6px;
        }

        button{
        padding:8px 15px;
        background:#6c63ff;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
        }

        button:hover{
        background:#5146ff;
        }

    </style>

</head>
<body>

<div class="header">
    <h1>Attendance Dashboard</h1>
    <div class="date">15-Jul-2026</div>
</div>

<div class="cards">

    <div class="card present">
        <h3>Present</h3>
        <h2>120</h2>
    </div>

    <div class="card absent">
        <h3>Absent</h3>
        <h2>15</h2>
    </div>

    <div class="card leave">
        <h3>On Leave</h3>
        <h2>8</h2>
    </div>

</div>

<table>

    <tr>
        <th>ID</th>
        <th>Employee</th>
        <th>Status</th>
        <th>Check In</th>
        <th>Check Out</th>
        <th>Action</th>
    </tr>

    <tr>
        <td>101</td>
        <td>Prashant</td>

        <td>
            <select>
                <option>Present</option>
                <option>Absent</option>
                <option>Leave</option>
            </select>
        </td>

        <td>
            <input type="time">
        </td>

        <td>
            <input type="time">
        </td>

        <td>
            <button>Save</button>
        </td>

    </tr>

    <tr>
        <td>102</td>
        <td>Rahul</td>

        <td>
            <select>
                <option>Present</option>
                <option>Absent</option>
                <option>Leave</option>
            </select>
        </td>

        <td>
            <input type="time">
        </td>

        <td>
            <input type="time">
        </td>

        <td>
            <button>Save</button>
        </td>

    </tr>

</table>

</body>
</html>
