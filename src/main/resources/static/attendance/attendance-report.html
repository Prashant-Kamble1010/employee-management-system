<!DOCTYPE html>
<html>
<head>
    <title>Monthly Attendance Report</title>

    <style>

        body{
        font-family:'Segoe UI';
        background:#f4f6f9;
        padding:30px;
        }

        .container{
        background:white;
        padding:25px;
        border-radius:15px;
        box-shadow:0 4px 10px rgba(0,0,0,.1);
        }

        h2{
        margin-bottom:20px;
        color:#6c63ff;
        }

        table{
        width:100%;
        border-collapse:collapse;
        }

        th{
        background:#6c63ff;
        color:white;
        padding:12px;
        }

        td{
        padding:12px;
        text-align:center;
        border-bottom:1px solid #ddd;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Monthly Attendance Summary</h2>

    <table>

        <tr>
            <th>Employee</th>
            <th>Present</th>
            <th>Absent</th>
            <th>Leave</th>
        </tr>

        <tr>
            <td>Prashant</td>
            <td>24</td>
            <td>2</td>
            <td>1</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>22</td>
            <td>3</td>
            <td>2</td>
        </tr>

    </table>

</div>

</body>
</html>
