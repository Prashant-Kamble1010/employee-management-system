<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Employee</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
        }

        body{
        background:#f4f6f9;
        padding:40px;
        }

        .container{
        max-width:700px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        h2{
        text-align:center;
        color:#6c63ff;
        margin-bottom:25px;
        }

        .form-group{
        margin-bottom:15px;
        }

        label{
        display:block;
        margin-bottom:5px;
        font-weight:600;
        }

        input,select{
        width:100%;
        padding:12px;
        border:1px solid #ddd;
        border-radius:8px;
        }

        input:focus,
        select:focus{
        outline:none;
        border-color:#6c63ff;
        }

        .btn{
        width:100%;
        padding:14px;
        background:#6c63ff;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-size:16px;
        }

        .btn:hover{
        background:#5146ff;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Update Employee</h2>

    <form th:action="@{/employees/save}"
          th:object="${employee}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Employee ID</label>
            <input type="text" th:field="*{employeeId}">
        </div>

        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" th:field="*{phone}">
        </div>

        <div class="form-group">
            <label>Department</label>
            <select th:field="*{department}">
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Sales">Sales</option>
            </select>
        </div>

        <div class="form-group">
            <label>Salary</label>
            <input type="number" th:field="*{salary}">
        </div>

        <button class="btn">
            Update Employee
        </button>

    </form>

</div>

</body>
</html>
