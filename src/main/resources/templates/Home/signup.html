<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
            linear-gradient(rgba(0,0,0,.5),
            rgba(0,0,0,.5)),
            url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1600');
            background-size:cover;
            background-position:center;
        }

        .container{
            width:950px;
            height:650px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(15px);
            border-radius:20px;
            overflow:hidden;
            display:flex;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        .left{
            width:50%;
            background:linear-gradient(135deg,#6c63ff,#4834d4);
            color:white;
            padding:50px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .left h1{
            font-size:45px;
            margin-bottom:20px;
        }

        .left p{
            font-size:18px;
            line-height:1.8;
        }

        .right{
            width:50%;
            background:white;
            padding:40px;
        }

        .right h2{
            text-align:center;
            color:#4834d4;
            margin-bottom:25px;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group input,
        .input-group select{
            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:10px;
            outline:none;
            font-size:15px;
        }

        .input-group input:focus,
        .input-group select:focus{
            border-color:#6c63ff;
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#6c63ff;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            background:#4834d4;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

        .login-link a{
            text-decoration:none;
            color:#6c63ff;
            font-weight:bold;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="left">
        <h1>Employee MS</h1>
        <p>
            Register yourself and become a part of our
            Employee Management System. Manage attendance,
            payroll, departments, leaves and employee profiles
            efficiently.
        </p>
    </div>

    <div class="right">

        <h2>Create Account</h2>

        <form action="/saveEmployee" method="post">

            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <input type="text" name="empId" placeholder="Employee ID" required>
            </div>

            <div class="input-group">
                <input type="tel" name="mobile" placeholder="Mobile Number" required>
            </div>

            <div class="input-group">
                <select name="department">
                    <option>Select Department</option>
                    <option>HR</option>
                    <option>IT</option>
                    <option>Finance</option>
                    <option>Marketing</option>
                </select>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="input-group">
                <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <button class="btn">Sign Up</button>

            <div class="login-link">
                Already have an account?
                <a href="signin">Sign In</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
