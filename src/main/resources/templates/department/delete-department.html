<!DOCTYPE html>
<html>
<head>
    <title>Delete Department</title>

    <style>

        body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#f4f6f9;
        font-family:'Segoe UI';
        }

        .card{
        background:white;
        padding:40px;
        border-radius:15px;
        text-align:center;
        box-shadow:0 5px 15px rgba(0,0,0,.1);
        width:450px;
        }

        h2{
        color:#dc3545;
        margin-bottom:20px;
        }

        .btn{
        padding:12px 20px;
        border:none;
        border-radius:8px;
        color:white;
        text-decoration:none;
        margin:5px;
        display:inline-block;
        }

        .delete{
        background:#dc3545;
        }

        .cancel{
        background:#198754;
        }

    </style>

</head>
<body>

<div class="card">

    <h2>Delete Department</h2>

    <p>
        Are you sure you want to delete
        <b>IT Department</b> ?
    </p>

    <br>

    <a href="#" class="btn delete">
        Yes Delete
    </a>

    <a href="/departments" class="btn cancel">
        Cancel
    </a>

</div>

</body>
</html>
