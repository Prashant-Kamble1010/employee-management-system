<!DOCTYPE html>
<html>
<head>
    <title>Assign Employees</title>

    <style>

        body{
        background:#f4f6f9;
        font-family:'Segoe UI';
        }

        .container{
        max-width:700px;
        margin:40px auto;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        h2{
        text-align:center;
        color:#198754;
        margin-bottom:20px;
        }

        select{
        width:100%;
        padding:12px;
        margin-bottom:15px;
        border:1px solid #ddd;
        border-radius:8px;
        }

        button{
        width:100%;
        padding:14px;
        background:#198754;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Assign Employees To Department</h2>

    <form>

        <select>
            <option>Select Department</option>
            <option>IT</option>
            <option>HR</option>
            <option>Finance</option>
            <option>Sales</option>
        </select>

        <select multiple size="8">

            <option>Prashant</option>
            <option>Rahul</option>
            <option>Amit</option>
            <option>Rohit</option>
            <option>Sneha</option>
            <option>Pooja</option>

        </select>

        <br><br>

        <button>
            Assign Employees
        </button>

    </form>

</div>

</body>
</html>
