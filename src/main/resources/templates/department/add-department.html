<!DOCTYPE html>
<html>
<head>
    <title>Add Department</title>

    <style>

        body{
        background:#f4f6f9;
        font-family:'Segoe UI';
        }

        .container{
        width:500px;
        margin:50px auto;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,.1);
        }

        h2{
        text-align:center;
        margin-bottom:20px;
        color:#6c63ff;
        }

        input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ddd;
        border-radius:8px;
        }

        button{
        width:100%;
        padding:14px;
        background:#6c63ff;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-size:16px;
        }

        button:hover{
        background:#5247ff;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Add Department</h2>

    <form>

        <input type="text"
               placeholder="Department Name">

        <input type="text"
               placeholder="Department Head">

        <button>
            Save Department
        </button>

    </form>

</div>

</body>
</html>
