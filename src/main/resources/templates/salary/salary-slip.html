<!DOCTYPE html>
<html>
<head>
    <title>Salary Slip</title>

    <style>

        body{
        font-family:'Segoe UI';
        background:#f4f6f9;
        padding:30px;
        }

        .slip{
        max-width:800px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 4px 15px rgba(0,0,0,.1);
        }

        h1{
        text-align:center;
        color:#6c63ff;
        margin-bottom:20px;
        }

        .row{
        display:flex;
        justify-content:space-between;
        padding:10px 0;
        border-bottom:1px solid #eee;
        }

        .total{
        font-size:22px;
        font-weight:bold;
        color:#28a745;
        }

    </style>
</head>
<body>

<div class="slip">

    <h1>Salary Slip</h1>

    <div class="row">
        <span>Employee Name</span>
        <span>Prashant</span>
    </div>

    <div class="row">
        <span>Employee ID</span>
        <span>101</span>
    </div>

    <div class="row">
        <span>Basic Salary</span>
        <span>₹50,000</span>
    </div>

    <div class="row">
        <span>Bonus</span>
        <span>₹5,000</span>
    </div>

    <div class="row">
        <span>Deduction</span>
        <span>₹1,000</span>
    </div>

    <div class="row total">
        <span>Net Salary</span>
        <span>₹54,000</span>
    </div>

</div>

</body>
</html>
