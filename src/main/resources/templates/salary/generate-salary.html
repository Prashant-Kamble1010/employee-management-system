<!DOCTYPE html>
<html>
<head>
    <title>Generate Salary</title>

    <style>

        body{
        background:#f4f6f9;
        font-family:'Segoe UI';
        }

        .container{
        width:650px;
        margin:40px auto;
        background:white;
        padding:30px;
        border-radius:15px;
        box-shadow:0 4px 15px rgba(0,0,0,.1);
        }

        h2{
        text-align:center;
        color:#6c63ff;
        margin-bottom:20px;
        }

        input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ddd;
        border-radius:8px;
        }

        button{
        width:100%;
        padding:14px;
        background:#6c63ff;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Generate Salary</h2>

    <form>

        <input type="text" placeholder="Employee Name">

        <input type="number" placeholder="Basic Salary">

        <input type="number" placeholder="Bonus">

        <input type="number" placeholder="Deductions">

        <input type="number" placeholder="Net Salary" readonly>

        <button>
            Generate Salary
        </button>

    </form>

</div>

</body>
</html>
